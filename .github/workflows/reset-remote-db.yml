name: Reset Remote D1

on:
  workflow_dispatch:
    inputs:
      confirm_reset:
        description: Type RESET to allow destructive remote reseeding
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: awesomekorea-remote-db-reset
  cancel-in-progress: false

jobs:
  reset:
    if: ${{ github.event.inputs.confirm_reset == 'RESET' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}
      CLOUDFLARE_D1_PREVIEW_ID: ${{ vars.CLOUDFLARE_D1_PREVIEW_ID || secrets.CLOUDFLARE_D1_ID }}
      CLOUDFLARE_KV_ID: ${{ secrets.CLOUDFLARE_KV_ID }}
      CLOUDFLARE_KV_PREVIEW_ID: ${{ vars.CLOUDFLARE_KV_PREVIEW_ID || secrets.CLOUDFLARE_KV_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production Wrangler config
        run: npm run deploy:config --workspace @awesomekorea/api

      - name: Apply remote migration
        run: >
          node ./node_modules/wrangler/bin/wrangler.js
          d1 execute DB
          --config ./apps/api/.wrangler/deploy.production.jsonc
          --remote
          --yes
          --file ./apps/api/migrations/0001_initial.sql

      - name: Reseed remote database
        run: >
          node ./node_modules/wrangler/bin/wrangler.js
          d1 execute DB
          --config ./apps/api/.wrangler/deploy.production.jsonc
          --remote
          --yes
          --file ./apps/api/seeds/seed.sql
